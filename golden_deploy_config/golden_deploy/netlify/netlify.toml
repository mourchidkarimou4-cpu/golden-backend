# ─── GOLDEN Investissement — Netlify Config ───────────────
# Fichier : netlify.toml
# Placer à la racine du projet React (frontend/)

[build]
  # Dossier contenant le code React
  base    = "frontend/"
  # Commande de build
  command = "npm run build"
  # Dossier de sortie généré par Vite / Create React App
  publish = "frontend/dist"

# ─── Redirections SPA ─────────────────────────────────────
# Indispensable pour React Router : toutes les URLs
# inconnues renvoient vers index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Variables d'environnement (Build time) ───────────────
# À définir aussi dans : Netlify Dashboard → Site → Environment variables
[build.environment]
  NODE_VERSION = "20"

# ─── Headers de sécurité ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ─── Cache des assets statiques ───────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
