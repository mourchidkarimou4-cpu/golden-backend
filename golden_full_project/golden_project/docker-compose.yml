version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       golden_db
      POSTGRES_USER:     golden_user
      POSTGRES_PASSWORD: golden_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golden_user -d golden_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API ────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --settings=config.settings.dev &&
             python manage.py runserver 0.0.0.0:8000 --settings=config.settings.dev"
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ─────────────────────────────────────────
  celery:
    build: .
    restart: unless-stopped
    command: celery -A config worker -l info -Q default,matching,notifications
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  # ── Celery Beat (tâches planifiées) ───────────────────────
  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  media_files:
